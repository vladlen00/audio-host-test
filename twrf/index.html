<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Проверка аудио</title>
<style>
  :root { --ok:#1c8a4a; --bad:#c0322b; --wait:#8a6d1c; --bg:#f5f3ef; --card:#fff; --ink:#222; --mut:#666; }
  * { box-sizing:border-box; -webkit-text-size-adjust:100%; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); padding:18px; line-height:1.45; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:21px; margin:0 0 6px; }
  .lead { color:var(--mut); font-size:15px; margin:0 0 16px; }
  .lead b { color:var(--ink); }
  .card { background:var(--card); border-radius:14px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .name { font-weight:600; font-size:16px; margin:0 0 10px; }
  audio { width:100%; display:block; }
  .status { margin-top:12px; font-size:15px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .dot { width:12px; height:12px; border-radius:50%; flex:0 0 auto; background:#bbb; }
  .s-wait .dot{ background:var(--wait); } .s-wait{ color:var(--wait); }
  .s-ok   .dot{ background:var(--ok);   } .s-ok  { color:var(--ok);   }
  .s-bad  .dot{ background:var(--bad);  } .s-bad { color:var(--bad);  }
  .s-play .dot{ background:var(--ok); animation:pulse 1s infinite; } .s-play{ color:var(--ok); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .hint { background:#fff8e6; border:1px solid #f0e0a8; border-radius:10px;
          padding:12px 14px; font-size:15px; margin:0 0 20px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Проверка аудио</h1>
  <p class="lead">Нажмите <b>▶</b>. Должна заиграть короткая мелодия (≈1 мин). Напишите, <b>заиграло или нет</b>.</p>
  <div class="hint">Если знаете — укажите город и оператора связи.</div>
  <div class="card">
    <div class="name">Аудио</div>
    <audio id="audio" controls preload="auto" playsinline src="https://s3.twcstorage.ru/irenabio-audio/test/test_audio.m4a?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=QSAREMTGXI1XANF5GQC8%2F20260630%2Fru-1%2Fs3%2Faws4_request&X-Amz-Date=20260630T122011Z&X-Amz-Expires=172800&X-Amz-SignedHeaders=host&X-Amz-Signature=ea354501528ba36e655456e2686f278d15fb56c6a1da18b3bf0cece1ce250bce"></audio>
    <div id="status" class="status s-wait"><span class="dot"></span><span class="txt">Проверяем доступность…</span></div>
  </div>
</div>
<script>
const audio = document.getElementById("audio");
const st = document.getElementById("status");
function setStatus(cls, text){ st.className = "status "+cls; st.querySelector(".txt").textContent = text; }
let settled = false;
const timer = setTimeout(() => { if(!settled){ settled=true; setStatus("s-bad","Не загрузилось — недоступно из вашей сети"); } }, 18000);
function ok(){ if(settled) return; settled=true; clearTimeout(timer); setStatus("s-ok","Загрузилось, можно играть"); }
function bad(){ if(settled) return; settled=true; clearTimeout(timer); setStatus("s-bad","Не загрузилось — недоступно из вашей сети"); }
audio.addEventListener("canplay", ok);
audio.addEventListener("loadeddata", ok);
audio.addEventListener("error", bad);
audio.addEventListener("playing", () => { clearTimeout(timer); settled=true; setStatus("s-play","Играет"); });
audio.addEventListener("pause", () => { if (st.classList.contains("s-play")) setStatus("s-ok","Пауза (загрузилось)"); });
audio.load();
</script>
</body>
</html>
